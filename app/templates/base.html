<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}T-Registro · EsSalud{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="{% block body_class %}{% endblock %}">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand-wrap">
        <img src="https://iconape.com/wp-content/png_logo_vector/essalud-logo.png"
             class="brand-logo-img" alt="EsSalud">
        <div class="brand-text">
          <div class="brand-name">Seguro Social de Salud del Perú</div>
          <div class="brand-sub">Gerencia de Recursos Humanos</div>
        </div>
      </div>
      <div class="brand-system">
        <span class="system-tag">T-REGISTRO</span>
        <span class="system-desc">Carga Masiva de Prestadores</span>
      </div>
    </div>
  </header>

  {% block panel_nav %}{% endblock %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <img src="https://iconape.com/wp-content/png_logo_vector/essalud-logo.png"
           class="footer-logo" alt="EsSalud">
      <span>© 2026 Seguro Social de Salud del Perú – EsSalud</span>
      <span class="footer-ver">Sistema T-Registro v2.0</span>
    </div>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
